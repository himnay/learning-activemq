spring:
  application:
    name: activemq-publisher
  activemq:
    broker-url: ${ACTIVEMQ_BROKER_URL:tcp://localhost:61616}
    user: ${ACTIVEMQ_USER:admin}
    password: ${ACTIVEMQ_PASSWORD:admin}
  jms:
    pub-sub-domain: true   # publish to topics, not queues

server:
  port: 8080

app:
  topics:
    orders: orders.topic
    payments: payments.topic
    shipments: shipments.topic
    virtual-orders: VirtualTopic.orders   # round-robin demo — broker mirrors into Consumer.*.VirtualTopic.orders queues

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
