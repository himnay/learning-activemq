spring:
  application:
    name: activemq-publisher
  activemq:
    broker-url: ${ACTIVEMQ_BROKER_URL:tcp://localhost:61616}
    user: ${ACTIVEMQ_USER:admin}
    password: ${ACTIVEMQ_PASSWORD:admin}
  jms:
    pub-sub-domain: true   # publish to topics, not queues

server:
  port: 8080

app:
  topics:
    virtual-orders: VirtualTopic.orders   # single publish destination — feeds topic subscribers AND Consumer.*.VirtualTopic.orders worker queues
  queues:
    quote: orders.quote.queue             # request-reply — consumer answers via JMSReplyTo

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
