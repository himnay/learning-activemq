spring:
  application:
    name: activemq-consumer
  activemq:
    broker-url: ${ACTIVEMQ_BROKER_URL:tcp://localhost:61616}
    user: ${ACTIVEMQ_USER:admin}
    password: ${ACTIVEMQ_PASSWORD:admin}
  jms:
    pub-sub-domain: true   # subscribe to topics; concurrency stays 1 — extra topic consumers would each get a copy

server:
  port: 8081

app:
  listener:
    # competing consumers per worker queue (min-max); round-robin happens across these
    worker-concurrency: 3-3
  topics:
    orders: orders.topic
    payments: payments.topic
    shipments: shipments.topic
  queues:
    # virtual-topic worker queues — broker copies every VirtualTopic.orders message
    # into each queue; competing consumers inside a queue get them round-robin
    worker-a: Consumer.workerA.VirtualTopic.orders
    worker-b: Consumer.workerB.VirtualTopic.orders

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
